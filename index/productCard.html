<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Card</title>
    <link rel="stylesheet" href="../style/productCard.css" />
  </head>
  <body>
    <main>
      <article class="productCard">
        <img src="../imgs/honey.jpg" alt="Honey" />
        <div class="card">
          <div class="left">
            <h1>100% Bio Honey</h1>
            <p>Italian, not treated</p>
          </div>
          <p class="price">7$/kg</p>
        </div>
        <div>
          <button>Add to cart</button>
        </div>
      </article>
    </main>
  </body>
</html>
